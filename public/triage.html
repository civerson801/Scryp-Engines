<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCO Error Triage</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810;
      --surface: #0d0d1a;
      --border: #16162a;
      --border2: #1e1e35;
      --text: #c8c8e0;
      --muted: #44445a;
      --muted2: #2a2a42;
      --accent: #4d7cff;
      --p1: #ff3333;
      --p2: #ff8800;
      --p3: #f0c020;
      --p4: #33bb66;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }

    .app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; border-bottom: 1px solid var(--border2);
      background: var(--bg);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 2px; color: #fff; }
    .badge { font-size: 9px; color: var(--muted); background: var(--surface); border: 1px solid var(--border2); padding: 2px 8px; border-radius: 3px; letter-spacing: 1px; text-transform: uppercase; }
    .dots { display: flex; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .sync-btn {
      background: var(--surface); border: 1px solid var(--border2); color: var(--muted);
      padding: 5px 14px; border-radius: 4px; cursor: pointer; font-family: var(--font-mono);
      font-size: 11px; transition: all 0.15s; letter-spacing: 0.5px;
    }
    .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sync-time { font-size: 10px; color: var(--muted2); }

    /* Main layout */
    main { display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }

    /* Error list */
    .error-list { border-right: 1px solid var(--border); overflow-y: auto; }
    .list-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .list-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .list-count { font-size: 10px; color: var(--muted2); }

    .error-item {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; border-left: 3px solid transparent; transition: all 0.1s;
    }
    .error-item:hover { background: rgba(77,124,255,0.04); }
    .error-item.selected { background: #0d0d20; border-left-color: var(--accent); }
    .error-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .priority-chip {
      font-size: 9px; font-weight: 600; padding: 1px 7px; border-radius: 3px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .error-status { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .error-msg { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 4px; word-break: break-word; }
    .error-item.selected .error-msg { color: #bbb; }
    .error-date { font-size: 10px; color: var(--muted2); }

    /* Analysis panel */
    .analysis-panel { overflow-y: auto; background: #090915; }
    .empty-state {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted2);
    }
    .empty-icon { font-size: 40px; opacity: 0.2; }
    .empty-text { font-size: 11px; letter-spacing: 1px; }

    .panel-inner { padding: 24px; }

    /* Error header card */
    .error-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; padding: 14px; margin-bottom: 20px;
    }
    .error-card-msg { font-size: 12px; color: #ccc; line-height: 1.6; margin-bottom: 8px; }
    .error-card-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 10px; color: var(--muted); }
    .error-card-meta span em { color: #666; font-style: normal; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted); padding: 8px 18px; cursor: pointer;
      font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: 1.5px; transition: all 0.12s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Spinner */
    .spinner-wrap { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; padding: 20px 0; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid var(--border2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Analysis content */
    .priority-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .priority-badge { padding: 4px 14px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 1px; }
    .priority-reason { font-size: 11px; color: var(--muted); font-style: italic; }

    .analysis-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 6px; padding: 14px; margin-bottom: 12px;
      border-left: 3px solid var(--accent);
    }
    .analysis-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .analysis-value { font-size: 12px; color: #aaa; line-height: 1.7; }

    .action-btn {
      background: #0a1630; border: 1px solid #1a3a6a; color: var(--accent);
      padding: 9px 18px; border-radius: 5px; cursor: pointer;
      font-family: var(--font-mono); font-size: 11px; margin-top: 4px;
      transition: all 0.15s; letter-spacing: 0.5px;
    }
    .action-btn:hover { background: #0d1f40; }

    /* Jira panel */
    .jira-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 14px; margin-bottom: 12px; }
    .jira-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .jira-title-text { font-size: 13px; color: #e2e2ee; font-weight: 500; line-height: 1.4; }
    .jira-desc { font-size: 11px; color: #888; line-height: 1.8; white-space: pre-wrap; font-family: var(--font-mono); }

    .jira-btn {
      background: #0047cc; border: 1px solid #0047cc; color: #fff;
      padding: 11px 22px; border-radius: 5px; cursor: pointer;
      font-family: var(--font-mono); font-size: 12px; font-weight: 500;
      transition: all 0.15s; letter-spacing: 0.5px;
    }
    .jira-btn:hover { background: #0055ee; }
    .jira-btn:disabled { background: #0d1a2e; border-color: #0d1a2e; color: #446; cursor: not-allowed; }
    .jira-btn.success { background: #0a160a; border-color: #2a4a2a; color: #4caf50; cursor: default; }

    .result-msg {
      padding: 10px 14px; border-radius: 5px; font-size: 12px; margin-bottom: 12px;
    }
    .result-msg.success { background: #0a160a; border: 1px solid #2a4a2a; color: #4caf50; }
    .result-msg.error { background: #160a0a; border: 1px solid #4a2a2a; color: #ff6b6b; }

    .fetch-error {
      margin: 12px; padding: 12px; background: #180808;
      border: 1px solid rgba(255,50,50,0.15); border-radius: 5px;
      font-size: 11px; color: #ff6666; line-height: 1.5;
    }
    .loading-state { padding: 32px; text-align: center; color: var(--muted2); font-size: 11px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="dots">
        <div class="dot" style="background:#ff3b3b;box-shadow:0 0 6px #ff3b3b88"></div>
        <div class="dot" style="background:#ff8800;box-shadow:0 0 6px #ff880088"></div>
        <div class="dot" style="background:#33bb66;box-shadow:0 0 6px #33bb6688"></div>
      </div>
      <span class="logo">ERROR TRIAGE</span>
      <span class="badge">CCO · checkcity.com · TDG</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="sync-time" id="syncTime"></span>
      <button class="sync-btn" id="syncBtn" onclick="fetchErrors()">↻ sync</button>
    </div>
  </header>

  <main>
    <div class="error-list">
      <div class="list-header">
        <span class="list-label">Error Groups</span>
        <span class="list-count" id="errorCount">—</span>
      </div>
      <div id="errorListBody">
        <div class="loading-state">connecting to raygun...</div>
      </div>
    </div>

    <div class="analysis-panel" id="analysisPanel">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-text">select an error to analyze</div>
      </div>
    </div>
  </main>
</div>

<script>
  const API = '/api/generate';
  const JIRA_PROJECT = 'TDG';

  const PRIORITY = {
    active:             { color: '--p2', label: 'P2 · HIGH',     bg: '#ff8800' },
    new:                { color: '--p1', label: 'P1 · CRITICAL', bg: '#ff3333' },
    resolved:           { color: '--p4', label: 'P4 · LOW',      bg: '#33bb66' },
    permanentlyIgnored: { color: '--p4', label: 'P4 · IGNORED',  bg: '#33bb66' },
    ignored:            { color: '--p3', label: 'P3 · MEDIUM',   bg: '#f0c020' },
  };

  const ACCENT_COLORS = ['#4d7cff', '#ff8800', '#a855f7', '#33bb66'];

  let allErrors = [];
  let selectedError = null;
  let currentAnalysis = null;
  let currentJiraDraft = null;
  let activeTab = 'analysis';

  function getPriority(err) {
    return PRIORITY[err.status] || { label: 'P3 · MEDIUM', bg: '#f0c020' };
  }

  async function fetchErrors() {
    const btn = document.getElementById('syncBtn');
    btn.textContent = '···';
    btn.disabled = true;
    document.getElementById('errorListBody').innerHTML = '<div class="loading-state">connecting to raygun...</div>';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'fetch_raygun' })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allErrors = data.errors || [];
      document.getElementById('errorCount').textContent = allErrors.length;
      document.getElementById('syncTime').textContent = 'synced ' + new Date().toLocaleTimeString();
      renderErrorList();
    } catch (e) {
      document.getElementById('errorListBody').innerHTML = `<div class="fetch-error">⚠ ${e.message}</div>`;
    } finally {
      btn.textContent = '↻ sync';
      btn.disabled = false;
    }
  }

  function renderErrorList() {
    const body = document.getElementById('errorListBody');
    if (!allErrors.length) {
      body.innerHTML = '<div class="loading-state">no errors found</div>';
      return;
    }
    body.innerHTML = allErrors.map((err, i) => {
      const p = getPriority(err);
      const isSelected = selectedError && selectedError.identifier === err.identifier;
      const msg = (err.message || 'Unknown error').slice(0, 75) + ((err.message || '').length > 75 ? '…' : '');
      const date = err.lastOccurredAt ? new Date(err.lastOccurredAt).toLocaleDateString() : '—';
      return `
        <div class="error-item${isSelected ? ' selected' : ''}" onclick="selectError(${i})">
          <div class="error-item-top">
            <span class="priority-chip" style="background:${p.bg}22;color:${p.bg};border:1px solid ${p.bg}44">${p.label}</span>
            <span class="error-status">${err.status || ''}</span>
          </div>
          <div class="error-msg">${escHtml(msg)}</div>
          <div class="error-date">${date}</div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function selectError(idx) {
    selectedError = allErrors[idx];
    currentAnalysis = null;
    currentJiraDraft = null;
    activeTab = 'analysis';
    renderErrorList();
    showAnalyzing();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'analyze_error', errorData: selectedError })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      currentAnalysis = data.analysis;
      currentJiraDraft = {
        title: data.analysis.jiraTitle,
        description: data.analysis.jiraDescription,
        priority: data.analysis.priority
      };
      renderAnalysis();
    } catch(e) {
      document.getElementById('analysisPanel').innerHTML = `
        <div class="panel-inner">
          <div class="fetch-error">⚠ ${escHtml(e.message)}</div>
        </div>`;
    }
  }

  function showAnalyzing() {
    document.getElementById('analysisPanel').innerHTML = `
      <div class="panel-inner">
        ${errorCardHTML()}
        <div class="spinner-wrap">
          <div class="spinner"></div>
          analyzing error with AI...
        </div>
      </div>`;
  }

  function errorCardHTML() {
    if (!selectedError) return '';
    const first = selectedError.createdAt ? new Date(selectedError.createdAt).toLocaleDateString() : '—';
    const last = selectedError.lastOccurredAt ? new Date(selectedError.lastOccurredAt).toLocaleDateString() : '—';
    return `
      <div class="error-card">
        <div class="error-card-msg">${escHtml(selectedError.message || 'Unknown error')}</div>
        <div class="error-card-meta">
          <span>status: <em>${selectedError.status || '—'}</em></span>
          <span>first: <em>${first}</em></span>
          <span>last: <em>${last}</em></span>
        </div>
      </div>`;
  }

  function tabsHTML() {
    return `
      <div class="tabs">
        <button class="tab-btn${activeTab==='analysis'?' active':''}" onclick="switchTab('analysis')">Analysis</button>
        <button class="tab-btn${activeTab==='jira'?' active':''}" onclick="switchTab('jira')">Jira Draft</button>
      </div>`;
  }

  function switchTab(tab) {
    activeTab = tab;
    renderAnalysis();
  }

  const PRIORITY_COLORS = {
    critical: { bg: '#ff3333', text: '#fff', label: 'P1 · CRITICAL' },
    high:     { bg: '#ff8800', text: '#fff', label: 'P2 · HIGH' },
    medium:   { bg: '#f0c020', text: '#000', label: 'P3 · MEDIUM' },
    low:      { bg: '#33bb66', text: '#fff', label: 'P4 · LOW' },
  };

  function renderAnalysis() {
    const a = currentAnalysis;
    const panel = document.getElementById('analysisPanel');
    const pc = PRIORITY_COLORS[a.priority] || PRIORITY_COLORS.medium;

    let content = '';
    if (activeTab === 'analysis') {
      const cards = [
        { label: 'What happened', value: a.plainEnglish, accent: ACCENT_COLORS[0] },
        { label: 'Business impact', value: a.impact, accent: ACCENT_COLORS[1] },
        { label: 'Root cause', value: a.rootCause, accent: ACCENT_COLORS[2] },
        { label: 'Dev recommendation', value: a.recommendation, accent: ACCENT_COLORS[3] },
      ];
      content = `
        <div class="priority-row">
          <span class="priority-badge" style="background:${pc.bg};color:${pc.text}">${pc.label}</span>
          <span class="priority-reason">${escHtml(a.priorityReason || '')}</span>
        </div>
        ${cards.map(c => `
          <div class="analysis-card" style="border-left-color:${c.accent}">
            <div class="analysis-label" style="color:${c.accent}">${c.label}</div>
            <div class="analysis-value">${escHtml(c.value || '')}</div>
          </div>`).join('')}
        <button class="action-btn" onclick="switchTab('jira')">Review Jira Draft →</button>`;
    } else {
      content = `
        <div class="jira-card">
          <div class="jira-label">Ticket Title</div>
          <div class="jira-title-text">${escHtml(currentJiraDraft?.title || '')}</div>
        </div>
        <div class="jira-card">
          <div class="jira-label">Description</div>
          <div class="jira-desc">${escHtml(currentJiraDraft?.description || '')}</div>
        </div>
        <div id="jiraResult"></div>
        <button class="jira-btn" id="jiraBtn" onclick="createJiraTicket()">→ Send to Jira Backlog · ${JIRA_PROJECT}</button>`;
    }

    panel.innerHTML = `
      <div class="panel-inner">
        ${errorCardHTML()}
        ${tabsHTML()}
        ${content}
      </div>`;
  }

  async function createJiraTicket() {
    const btn = document.getElementById('jiraBtn');
    if (!btn || !currentJiraDraft) return;
    btn.disabled = true;
    btn.textContent = 'creating in jira...';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'create_jira',
          jiraData: {
            project: JIRA_PROJECT,
            title: currentJiraDraft.title,
            description: currentJiraDraft.description,
            priority: currentJiraDraft.priority
          }
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      document.getElementById('jiraResult').innerHTML = `<div class="result-msg success">✓ ${data.key || 'Ticket'} created in ${JIRA_PROJECT} backlog</div>`;
      btn.className = 'jira-btn success';
      btn.textContent = '✓ created';
    } catch(e) {
      document.getElementById('jiraResult').innerHTML = `<div class="result-msg error">✗ ${escHtml(e.message)}</div>`;
      btn.disabled = false;
      btn.textContent = `→ Send to Jira Backlog · ${JIRA_PROJECT}`;
    }
  }

  fetchErrors();
</script>
</body>
</html>
